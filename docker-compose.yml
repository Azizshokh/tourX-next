      PORT: 3000
      REACT_APP_API_URL: http://159.223.189.141:4001
      REACT_APP_API_GRAPHQL_URL: http://159.223.189.141:4001/graphql
      REACT_APP_API_WS: ws://159.223.189.141:4001
    networks:
      - tourx-client-network

networks:
  tourx-client-network:
    driver: bridge
